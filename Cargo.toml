[workspace]
members = [
    "crates/shared",
    "crates/host",
    "crates/overlay-exe",
    "crates/ultralight-sys",
    "crates/omni-sanitize",
    "crates/omni-bundle",
    "crates/omni-guard-trait",
    "crates/omni-identity",
    "tools/integrity-hash",
]
resolver = "2"

[patch."ssh://git@github.com/djowinz/omni-guard.git"]
omni-guard = { path = "stubs/omni-guard" }

[profile.release]
lto = "thin"
codegen-units = 1
strip = "symbols"
