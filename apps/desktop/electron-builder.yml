appId: com.omni.desktop
productName: Omni
extraResources:
  # Electron-owned assets — installer icons (omni-logo.*), UI fonts (Geist,
  # Monaspace), renderer icon font (feather.woff2). Bulk-copied into the
  # install's `resources/` root.
  - from: 'resources/'
    to: '.'
  # Moderation ONNX models (NudeNet + Falconsai). Live in the moderation
  # crate's resources/ — they're loaded by `crates/moderation` (called from
  # the Rust host), NOT by the Electron app. Mirrored here at install time
  # so the host's `default_model_paths()` finds them at
  # `<exe-dir>/resources/moderation/<filename>`. Same crate-owned-resources
  # pattern as `crates/host/resources/feather.{ttf,css}` below.
  - from: '../../crates/moderation/resources/nudenet.onnx'
    to: 'moderation/nudenet.onnx'
  - from: '../../crates/moderation/resources/nsfw_falconsai.onnx'
    to: 'moderation/nsfw_falconsai.onnx'
directories:
  output: dist
files:
  - app/**/*
  - main/**/*
  - package.json
  - '!renderer'
  - '!src'
  - '!resources'
  - '!**/*.ts'
  - '!**/*.tsx'
  - '!**/*.map'
  - '!tsconfig.json'
  - '!postcss.config.mjs'
extraFiles:
  # Rust host binary
  - from: '../../target/release/omni-host.exe'
    to: 'omni-host.exe'
  # External overlay binary
  - from: '../../target/release/omni-overlay.exe'
    to: 'omni-overlay.exe'
  # Ultralight runtime DLLs
  - from: '../../vendor/ultralight/bin/Ultralight.dll'
    to: 'Ultralight.dll'
  - from: '../../vendor/ultralight/bin/UltralightCore.dll'
    to: 'UltralightCore.dll'
  - from: '../../vendor/ultralight/bin/WebCore.dll'
    to: 'WebCore.dll'
  - from: '../../vendor/ultralight/bin/AppCore.dll'
    to: 'AppCore.dll'
  # Ultralight resources
  - from: '../../vendor/ultralight/resources/cacert.pem'
    to: 'resources/cacert.pem'
  - from: '../../vendor/ultralight/resources/icudt67l.dat'
    to: 'resources/icudt67l.dat'
  # Feather icon font (used by host HTML builder — TTF for Ultralight compatibility)
  - from: '../../crates/host/resources/feather.ttf'
    to: 'feather.ttf'
  - from: '../../crates/host/resources/feather.css'
    to: 'feather.css'
  # ONNX Runtime DirectML EP runtime DLL — pyke's `download-binaries` build
  # script (activated via the `moderation` crate's `ort` feature flags)
  # symlinks this into target/release alongside omni-host.exe. See OWI-49 /
  # Wave 0.2 ort POC report (`docs/superpowers/specs/upload-flow-redesign-mockups/notes/0.2-ort-msvc.md`).
  # Win10 1903+ ships a system copy in System32 but we bundle the pinned
  # version for determinism.
  - from: '../../target/release/DirectML.dll'
    to: 'DirectML.dll'
  # Admin elevation manifest
  - from: 'installer/Omni.exe.manifest'
    to: 'Omni.exe.manifest'
publish:
  provider: github
  owner: djowinz
  repo: omni
electronLanguages:
  - en-US
win:
  icon: resources/omni-logo.ico
  requestedExecutionLevel: requireAdministrator
  target: nsis
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: true
  installerHeaderIcon: resources/omni-logo.ico
  installerIcon: resources/omni-logo.ico
  uninstallerIcon: resources/omni-logo.ico
  shortcutName: Omni
  uninstallDisplayName: Omni
  license: license.txt
  artifactName: OmniSetup.${ext}
  deleteAppDataOnUninstall: false
  include: installer/uninstall-hooks.nsh
