name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint-rust:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-dev
      - run: make lint-rust

  test-rust:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-dev
      - run: make test-rust
      - name: Verify default build without guard feature
        shell: bash
        run: |
          cargo build --package omni-host
          cargo test --package omni-host
          cargo test --package omni-guard-trait
          cargo test --package omni-guard-trait --features serde

  lint-desktop:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - run: make install
      - run: make lint-desktop

  test-desktop:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - run: make install
      - run: make test-desktop
