name: CI

on:
  pull_request:
    branches: [main]

jobs:
  rust:
    name: Rust build + test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-dev
      # Cache the moderation ONNX models keyed on the manifest content, so the
      # ~96 MB download only happens when the manifest changes. The fetcher
      # itself is idempotent — when the cache restores files it detects them
      # already-present-and-verified and exits in <1s.
      - name: Cache moderation models
        uses: actions/cache@v4
        with:
          path: crates/moderation/resources/*.onnx
          key: moderation-models-${{ hashFiles('crates/moderation/resources/MODELS.toml') }}
      - name: Fetch moderation models
        run: cargo run --release -p fetch-models
      - name: cargo fmt
        run: cargo fmt --check
      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings
      - name: cargo test
        run: cargo test --workspace
      - name: Build with dev-no-guard feature
        run: cargo build --workspace --features host/dev-no-guard
      - name: Test with dev-no-guard feature
        run: cargo test --workspace --features host/dev-no-guard

  node-checks:
    name: Node typecheck + lint + format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm format:check

  node-test:
    name: Node tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  types-drift:
    name: ts-rs drift check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-dev
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Regenerate shared types and check for drift
        run: |
          cargo test -p shared -p host
          git diff --exit-code packages/shared-types/src/generated

  worker-zip-compat:
    # Umbrella §8.2 gate: .omnipkg bundles must open in stock GNU unzip +
    # 7-Zip. Runs on Linux because that's where both tools are trivially
    # installable; the bundle format is platform-agnostic so one OS suffices.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: worker-wasm
      - name: Install wasm-pack
        run: cargo install wasm-pack --locked
      - name: Install archive tools
        run: sudo apt-get update && sudo apt-get install -y unzip p7zip-full
      - name: Install JS deps
        working-directory: apps/worker
        run: pnpm install --frozen-lockfile
      - name: Build WASM + fixtures
        working-directory: apps/worker
        run: pnpm build:wasm && node test/fixtures/generate.mjs
      - name: Run zip-compat suite
        working-directory: apps/worker
        run: pnpm vitest run --config vitest.node.config.ts

  structure:
    name: Structural invariants
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check structure
        run: ./scripts/check-structure.sh

  bump-version-script:
    # Bumps to a sentinel version, validates every Cargo.toml + every
    # apps/* / packages/* package.json reports it, then restores via git.
    # Catches a forgotten `version.workspace = true` on a new crate, a new
    # JS package added without updating the bumper, or any regression in
    # scripts/bump-version.sh itself.
    name: bump-version.sh sanity
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run bump-version sanity test
        shell: bash
        run: ./scripts/test-bump-version.sh
