name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Verify default build without guard feature
        shell: bash
        run: |
          cargo build --package omni-host
          cargo test --package omni-host
          cargo test --package omni-guard-trait
          cargo test --package omni-guard-trait --features serde

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: make install

      - name: Lint
        run: make lint

      - name: Build and test
        run: make build
