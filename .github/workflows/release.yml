name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      increment:
        description: 'Version increment type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build Stage 1 (reference binary; no strict-integrity)
        shell: bash
        run: |
          cargo build --release --package host

      - name: Extract .text SHA-256 from Stage 1 binary
        id: integrity
        shell: bash
        run: |
          HASH=$(cargo run --package integrity-hash --release --quiet -- target/release/omni-host.exe)
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "Stage 1 .text SHA-256: $HASH"

      # Stage 2 enables strict-integrity, which (a) flips option_env! to env!
      # for the OMNI_GUARD_TEXT_SHA256 string-literal constant in .rdata and
      # (b) gates the IntegrityFailed return in RealGuard::new(). The .text
      # bytes that integrity-hash measures are unaffected by either change.
      # The hash-match step below is the load-bearing guarantee.
      - name: Build Stage 2 (release binary; strict-integrity)
        shell: bash
        env:
          OMNI_GUARD_TEXT_SHA256: ${{ steps.integrity.outputs.hash }}
        run: |
          cargo build --release --package host --features omni-guard/strict-integrity

      - name: Verify Stage 1 and Stage 2 .text bytes match
        shell: bash
        run: |
          STAGE2_HASH=$(cargo run --package integrity-hash --release --quiet -- target/release/omni-host.exe)
          if [ "$STAGE2_HASH" != "${{ steps.integrity.outputs.hash }}" ]; then
            echo "ERROR: Stage 1 vs Stage 2 .text drift. Stage 1=${{ steps.integrity.outputs.hash }}, Stage 2=$STAGE2_HASH" >&2
            exit 1
          fi
          echo "Stage 1 == Stage 2 .text bytes — OK."

      # Negative integrity test (retro D-004-I): runs from the integrity_negative
      # test in crates/omni-guard/tests/, gated on required-features = ["strict-integrity"].
      # Add a step here in a follow-up if we want CI to run it on every release;
      # for now the test exists and contributors can run it locally.

      # Fetch the bundled moderation ONNX models (NudeNet + Falconsai). The
      # files are gitignored — only the manifest at
      # `crates/moderation/resources/MODELS.toml` is in the repo.
      # electron-builder's `extraResources: resources/` step (later in the
      # pipeline) needs them on disk to bundle into the installer.
      - name: Cache moderation models
        uses: actions/cache@v4
        with:
          path: crates/moderation/resources/*.onnx
          key: moderation-models-${{ hashFiles('crates/moderation/resources/MODELS.toml') }}
      - name: Fetch moderation models
        run: cargo run --release -p fetch-models

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: make install

      - name: Determine increment
        id: increment
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ inputs.increment }}" >> "$GITHUB_OUTPUT"
          else
            PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
            if [ -n "$PREV_TAG" ]; then
              LOGS=$(git log "${PREV_TAG}..HEAD" --oneline)
            else
              LOGS=$(git log --oneline)
            fi
            if echo "$LOGS" | grep -qiE "^[a-f0-9]+ major:"; then
              echo "type=major" >> "$GITHUB_OUTPUT"
            elif echo "$LOGS" | grep -qiE "^[a-f0-9]+ (feat|feature):"; then
              echo "type=minor" >> "$GITHUB_OUTPUT"
            else
              echo "type=patch" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: make release INCREMENT=${{ steps.increment.outputs.type }}
