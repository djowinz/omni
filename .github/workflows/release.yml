name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      increment:
        description: "Version increment type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: make install

      - name: Determine increment
        id: increment
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ inputs.increment }}" >> "$GITHUB_OUTPUT"
          else
            PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
            if [ -n "$PREV_TAG" ]; then
              LOGS=$(git log "${PREV_TAG}..HEAD" --oneline)
            else
              LOGS=$(git log --oneline)
            fi
            if echo "$LOGS" | grep -qiE "^[a-f0-9]+ major:"; then
              echo "type=major" >> "$GITHUB_OUTPUT"
            elif echo "$LOGS" | grep -qiE "^[a-f0-9]+ (feat|feature):"; then
              echo "type=minor" >> "$GITHUB_OUTPUT"
            else
              echo "type=patch" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: make release INCREMENT=${{ steps.increment.outputs.type }}
